<!--const DEBUG_MODE = -->
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<!-- 禁止手機瀏覽器縮放與滾動，確保觸控滑順 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
<title>Coco狐快跑</title>
<style>
:root{
  --sky-top: #a1c4fd; /* 初始白天為粉藍晴空 */
  --sky-bottom: #c2e9fb;
  --snow: #eef6fb;
  --ink: #1c3f66;
  --line: #6a63e0;
  --accent: #f2604a;
  --accent2: #9aa0a6;
  --card: #ffffff;
}
html, body {
  margin: 0; padding: 0; height: 100%;
  /* 💡 核心修改 1：保留網站整體的最美深藍漸層背景 */
  background: linear-gradient(180deg, #0b1d3a, #1c3f66); 
  font-family: 'Courier New', monospace;
  color: var(--ink);
  display: flex; 
  align-items: center;      /* 垂直居中 */
  justify-content: center;   /* 水平居中 */
  flex-direction: column;
  overflow: hidden; 
  touch-action: none; 
}
h1 {
  /* 💡 將遊戲標題鎖定為雪白色，在網頁深藍背景下最亮眼 */
  color: var(--snow); 
  letter-spacing: 3px;
  font-size: 22px;
  margin: 10px 0 10px;
  text-transform: uppercase;
  text-shadow: 0 2px 6px rgba(0,0,0,0.4);
}
#wrap {
  position: relative;
  width: 800px; height: 300px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  border-radius: 8px;
  overflow: hidden;
  background: var(--card);
  transform-origin: center center; /* 縮放原點在正中央 */
  margin: 0; /* 清空預設 margin */
}
canvas {
  display: block; 
  position: absolute; 
  top: 0; left: 0; 
  touch-action: none;
}
#playerSprite {
  position: absolute;
  image-rendering: -webkit-optimize-contrast;
  image-rendering: pixelated;
  pointer-events: none;
  will-change: transform;
  transform-origin: center bottom;
  z-index: 5;
}
#hint {
  font-size: 13px;
  color: var(--snow); /* 鎖定為白色，在網頁深藍背景下清晰可見 */
  opacity: 0.8;
  margin-top: 15px;
  letter-spacing: 1px;
  text-align: center;
  padding: 0 10px;
  line-height: 1.5;
  z-index: 2;
}

/* 直屏專用的下方提示區 */
#portraitAlert {
  display: none;
  background: rgba(255, 255, 255, 0.15);
  border: 1px dashed rgba(255, 255, 255, 0.3);
  color: var(--snow);
  border-radius: 8px;
  padding: 10px 15px;
  margin-top: 15px;
  font-size: 13px;
  text-align: center;
  max-width: 90%;
  box-sizing: border-box;
}

/* 靜音控制按鈕 */
#muteBtn {
  position: absolute;
  top: 15px; left: 15px;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: rgba(255, 253, 247, 0.9);
  border: 2px solid var(--line);
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 20;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  user-select: none;
  -webkit-user-select: none;
  transition: transform 0.1s, background 0.2s;
}
#muteBtn:active {
  transform: scale(0.9);
}

#overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  background: rgba(255,255,255,0.95);
  text-align: center;
  font-size: 16px;
  padding: 15px;
  box-sizing: border-box;
  z-index: 10;
}
#overlay button {
  margin-top: 16px;
  padding: 10px 24px;
  font-family: inherit;
  font-weight: bold;
  font-size: 15px;
  letter-spacing: 2px;
  background: var(--line);
  color: #fff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(106,99,224,0.3);
  transition: transform 0.1s;
}
#overlay button:active {
  transform: scale(0.95);
}
.statsRow {
  display: flex; gap: 20px; margin-top: 14px; font-size: 14px;
  background: #f0f4f8; padding: 8px 16px; border-radius: 20px;
}
.hidden { display: none !important; }

/* ==========================================
   📱 手機端排版 RWD 優化
   ========================================== */
@media screen and (max-height: 500px) and (orientation: landscape) {
  h1 {
    display: none !important; 
  }
  #hint {
    margin-top: 5px; 
  }
}

@media screen and (max-aspect-ratio: 13/9) and (max-width: 800px) {
  html, body {
    justify-content: flex-start; 
    padding-top: 5%;             
  }
  h1 {
    font-size: 18px;
    margin: 10px 0;
  }
  #portraitAlert {
    display: block; 
  }
}
</style>
</head>
<body>

<h1 id="gameTitle">🦊 Coco狐快跑 🦊</h1>
<div id="wrap">
  <canvas id="game" width="800" height="300"></canvas>
  <!-- 你的去背白狐狸 GIF -->
  <img id="playerSprite" src="ezgif-CocoFoxSantaRunningTransparent_1.gif" width="76" height="76">
  
  <!-- BGM 開關按鈕 -->
  <div id="muteBtn">🎵</div>

  <div id="overlay">
    <div id="overlayText">按空白鍵 / 點擊左半邊螢幕 開始奔跑</div>
    <button id="startBtn">開始遊戲</button>
    <div id="statsDisplay" class="statsRow" style="display:none;"></div>
  </div>
</div>
<div id="hint">💻 電腦版: 空白鍵/↑ 跳躍 · ↓ 下蹲<br>📱 手機版: 點擊【螢幕左側】跳躍 · 按住【螢幕右側】下蹲</div>

<!-- 直屏下方提示區 -->
<div id="portraitAlert">
  🔄 <b>推薦旋轉手機橫屏遊玩！</b><br>
  橫屏會自動放大畫面，視野更寬廣，躲避蟑螂更輕鬆喔！
</div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const spriteEl = document.getElementById('playerSprite');
  const W = canvas.width, H = canvas.height;
  const groundY = 235;

  // --- 【Debug 工具：如果你想在畫面上直接看見判定盒，請改成 true】 ---
  const DEBUG_MODE = false; 

  const overlay = document.getElementById('overlay');
  const overlayText = document.getElementById('overlayText');
  const statsDisplay = document.getElementById('statsDisplay');
  const startBtn = document.getElementById('startBtn');
  const muteBtn = document.getElementById('muteBtn');

  let state = 'ready';
  
  // 速度與物理參數
  let speed = 3.5, baseSpeed = 3.5, gravity = 0.6;
  let score = 0, best = 0, frame = 0;
  let obstacles = [], collectibles = [], snowflakes = [];
  
  // 統一的生成器冷卻時間 (單位：幀)
  let spawnCooldown = 0; 
  let poopCount = 0, giftCount = 0;

  // FPS 控制器變數
  let lastTime = performance.now();
  const fps = 60;
  const msPerFrame = 1000 / fps; // 每幀大約 16.67ms

  // --- 【核心修改 3：白雲數據設計】 ---
  // 每朵雲是由「一組具有相對座標的圓形」組合而成，呈現出多個圓形重疊的複雜、鬆軟蓬鬆形狀
  let clouds = [];
  function initClouds() {
    clouds = [];
    for (let i = 0; i < 3; i++) {
      const baseWidth = 70 + Math.random() * 30;
      clouds.push({
        x: Math.random() * W,
        y: 25 + Math.random() * 40,
        w: baseWidth,
        h: 20,
        speed: 0.12 + Math.random() * 0.15,
        
        // 生成這朵雲內部的重疊圓形粒子（相對圓心座標與半徑）
        circles: [
          { rx: baseWidth * 0.25, ry: -5,  r: 16 + Math.random() * 6 },  // 左側雲頂
          { rx: baseWidth * 0.5,  ry: -14, r: 22 + Math.random() * 8 },  // 中央大雲頂
          { rx: baseWidth * 0.75, ry: -6,  r: 15 + Math.random() * 5 }   // 右側雲頂
        ]
      });
    }
  }
  initClouds();

  // === 【新增：連綿不絕的幾何三角形雪山數據結構】 ===
  // === 【重構：雙層立體摺紙幾何山脈數據結構】 ===
  let mountains = [];
  function initMountains() {
    mountains = [];
    
    // 1. 生成後排遠山（更高、更寬、更淡、速度更慢）
    let farX = -100;
    while (farX < W + 200) {
      const width = 160 + Math.random() * 120;
      const height = 55 + Math.random() * 35;
      const peakOffset = width * (0.2 + Math.random() * 0.6); // 大幅隨機歪斜
      mountains.push({
        x: farX, w: width, h: height, peakOffset: peakOffset,
        layer: 'far', // 標記為遠山
        scrollSpeed: 0.03, // 極慢速視差
        colorL: '#cce2fc', colorR: '#b4d4f7', // 遠山左亮右暗配色
        snowL: 'rgba(255,255,255,0.85)', snowR: 'rgba(240,246,255,0.85)'
      });
      farX += width * (0.6 + Math.random() * 0.3); // 密集交疊
    }

    // 2. 生成前排近山（矮一些、更錯落、顏色稍深、速度快一倍）
    let nearX = -50;
    while (nearX < W + 200) {
      const width = 110 + Math.random() * 90;
      const height = 35 + Math.random() * 25;
      const peakOffset = width * (0.25 + Math.random() * 0.5); // 隨機歪斜山頂
      mountains.push({
        x: nearX, w: width, h: height, peakOffset: peakOffset,
        layer: 'near', // 標記為近山
        scrollSpeed: 0.06, // 稍快視差，與遠山形成3D層次
        colorL: '#add2fa', colorR: '#92c1f3', // 近山左亮右暗配色
        snowL: 'rgba(255,255,255,0.95)', snowR: 'rgba(230,240,255,0.95)'
      });
      // 近山有較高機率斷開，露出遠山
      if (Math.random() < 0.25) {
        nearX += width + (40 + Math.random() * 80); // 形成漂亮的斷開山谷
      } else {
        nearX += width * 0.7; // 連綿交疊
      }
    }
  }
  initMountains(); // 初始生成雪山

  // 動態背景大樓數據陣列
  let cityBuildings = [];
  function initBuildings() {
    cityBuildings = [];
    let currentX = 0;
    while (currentX < W + 150) {
      const width = 60 + Math.random() * 80;
      const height = 100 + Math.random() * 110;
      const windows = [];
      const cols = Math.floor(width / 18);
      const rows = Math.floor(height / 25);
      for(let r=1; r<rows-1; r++){
        for(let c=1; c<cols-1; c++){
          if(Math.random() < 0.35) { 
            windows.push({dx: c*18, dy: r*25});
          }
        }
      }
      cityBuildings.push({ x: currentX, w: width, h: height, windows });
      currentX += width - 5; 
    }
  }
  initBuildings();

  // 音訊物件初始化
  const audio = {
    jump: new Audio('JumpVoiceHeiCoco.m4a'),
    scoreMilestone: new Audio('ScoreVoiceUwaCoco_2.m4a'),
    bgm: new Audio('BgmPadoruCoco.mp4')
  };

  audio.bgm.loop = true;
  let isMuted = false;
  let lastMilestoneScore = 0; 

  const images = {
    police: new Image(),
    cone: new Image(),
    roach: new Image(),
    poop: new Image(),
    gift: new Image()
  };
  
  images.police.src = 'Cop2Trans.png';
  images.cone.src = 'TrafficConeTrans.png';
  images.roach.src = 'CockroachTrans.png';
  images.poop.src = 'PoopTrans.png';
  images.gift.src = 'GiftBoxTrans.png';

  const SPRITE_W = 76, SPRITE_H = 76;
  
  const player = {
    x: 65, y: groundY - 58, w: 44, h: 58,
    vy: 0, ducking: false, onGround: true
  };

  function resetGame(){
    speed = baseSpeed; score = 0; frame = 0;
    lastMilestoneScore = 0;
    obstacles = []; collectibles = []; snowflakes = [];
    poopCount = 0; giftCount = 0;
    player.y = groundY - 58; player.vy = 0;
    player.ducking = false; player.onGround = true;
    
    spawnCooldown = 60; 
    initBuildings();
    initClouds();
    initMountains();
  }

  // 雪花生成邏輯
  function spawnSnow(initial){
    snowflakes.push({
      x: Math.random()*W,
      y: initial ? Math.random()*groundY : -10,
      r: 1+Math.random()*2.4,
      vy: 0.4+Math.random()*0.8,
      drift: (Math.random()-0.5)*0.6
    });
  }

  function rectsOverlap(a, b){
    return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
  }

  // 障礙物生成
  function spawnObstacle(){
    const kinds = ['police', 'cone', 'cone', 'roach'];
    const kind = kinds[Math.floor(Math.random()*kinds.length)];
    let w, h, y;
    if(kind==='police'){ w=50; h=60; y=groundY-h; }
    else if(kind==='cone'){ w=40; h=50; y=groundY-h; }
    else { 
      w=55; h=35;
      const levels=[groundY-70, groundY-105, groundY-145];
      y = levels[Math.floor(Math.random()*levels.length)];
    }
    obstacles.push({x: W+20, y, w, h, kind, wing: 0});
  }

  // 收集物生成
  function spawnCollectible(){
    const kind = Math.random() < 0.5 ? 'poop' : 'gift';
    const w=40, h=40;
    const levels = [groundY-h, groundY-75, groundY-120];
    const y = levels[Math.floor(Math.random()*levels.length)];
    collectibles.push({x: W+20, y, w, h, kind, taken: false, spin: 0});
  }

  // 統一生成控制器
  function manageSpawning() {
    if (spawnCooldown > 0) {
      spawnCooldown--;
      return;
    }

    const spawnType = Math.random() < 0.7 ? 'obstacle' : 'collectible';
    
    if (spawnType === 'obstacle') {
      spawnObstacle();
    } else {
      spawnCollectible();
    }

    const minDistancePixels = 280; 
    const randomExtraPixels = Math.random() * 180; 
    
    spawnCooldown = Math.floor((minDistancePixels + randomExtraPixels) / speed);
  }

  function playSound(sound) {
    if (isMuted) return;
    sound.currentTime = 0; 
    sound.play().catch(e => console.log("音效播放失敗: ", e));
  }

  // 跳躍
  function jump(){
    if(state==='ready' || state==='gameover'){ startGame(); return; }
    if(player.onGround && !player.ducking){
      player.vy = -12.2;
      player.onGround = false;
      playSound(audio.jump); 
    }
  }
  
  function duckStart(){ if(state==='running') player.ducking = true; }
  function duckEnd(){ player.ducking = false; }

  // 聲音開關
  function toggleMute() {
    isMuted = !isMuted;
    audio.bgm.muted = isMuted;
    muteBtn.innerHTML = isMuted ? '🔇' : '🎵';
  }
  muteBtn.addEventListener('click', toggleMute);
  muteBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    toggleMute();
  }, { passive: false });

  // 電腦版鍵盤事件
  window.addEventListener('keydown', (e)=>{
    if(e.code==='Space' || e.code==='ArrowUp'){ e.preventDefault(); jump(); }
    else if(e.code==='ArrowDown'){ e.preventDefault(); duckStart(); }
    else if(e.code==='KeyR' && state==='gameover'){ startGame(); }
  });
  window.addEventListener('keyup', (e)=>{ if(e.code==='ArrowDown') duckEnd(); });

  // 手機版觸控（左跳右蹲）
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if(state !== 'running') {
      startGame();
      return;
    }
    
    const rect = canvas.getBoundingClientRect();
    const touchX = e.touches[0].clientX - rect.left;
    const canvasWidth = rect.width;

    if (touchX < canvasWidth / 2) {
      jump(); 
    } else {
      duckStart(); 
    }
  }, { passive: false });

  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    if (e.touches.length === 0) {
      duckEnd();
    }
  }, { passive: false });

  canvas.addEventListener('mousedown', (e) => {
    if (state === 'running') {
      jump();
    }
  });

  startBtn.addEventListener('click', startGame);
  startBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    startGame();
  }, { passive: false });

  function startGame(){
    if (!isMuted) {
      audio.bgm.play().catch(e => console.log("BGM 播放受限"));
    }
    resetGame();
    state = 'running';
    overlay.classList.add('hidden');
    statsDisplay.style.display = 'none';
  }

  function endGame(){
    state = 'gameover';
    best = Math.max(best, Math.floor(score));
    overlayText.innerHTML = `遊戲結束 · 分數 ${Math.floor(score)} 最高 ${best}`;
    statsDisplay.innerHTML = `<span>💩 便便 x ${poopCount}</span><span>🎁 禮物 x ${giftCount}</span>`;
    statsDisplay.style.display = 'flex';
    overlay.classList.remove('hidden');
  }

  // 取得當前玩家精準判定盒的輔助函數
  function getPlayerHitbox() {
    const isDucking = player.ducking && player.onGround;
    const topOffset = isDucking ? 24 : 10; 
    const hitH = isDucking ? 14 : player.h - 16;  

    return {
      x: player.x + 12,
      y: player.y + topOffset,
      w: player.w - 24,
      h: hitH
    };
  }

  // 獲取當前關卡場景主題 (0~1000：雪地白天，1000~2000：霓虹夜城)
  function getTheme() {
    const relativeScore = Math.floor(score) % 2000;
    return relativeScore < 1000 ? 'snow' : 'city';
  }

  function update(){
    frame++;
    score += speed*0.045;
    speed = baseSpeed + Math.sqrt(score) * 0.08;

    let currentMilestone = Math.floor(score / 100);
    if (currentMilestone > lastMilestoneScore) {
      lastMilestoneScore = currentMilestone;
      playSound(audio.scoreMilestone);
    }

    // 狐狸高度物理屬性
    const duckH = 34, standH = 58;
    player.h = player.ducking && player.onGround ? duckH : standH;
    player.y += player.vy;
    if(!player.onGround) player.vy += gravity;
    const floorY = groundY - player.h;
    if(player.y >= floorY){ player.y = floorY; player.vy = 0; player.onGround = true; }

    const theme = getTheme();

    // 💡 根據關卡主題更新雪花或雲朵
    if (theme === 'city') {
      snowflakes.forEach(s=>{ s.y += s.vy; s.x += s.drift; });
      snowflakes = snowflakes.filter(s=> s.y < groundY+10);
      if(Math.random()<0.35) spawnSnow(false);
      clouds = []; // 夜晚清空雲朵
    } else {
      snowflakes = []; // 白天清空雪花

      // 💡 【新增】：更新幾何雪山滾動（極慢速視差，speed * 0.05）
      // 💡 【重構】：支援遠近雙層各自滾動的速度視差（不再共用單一0.05速度）
      mountains.forEach(m => {
        m.x -= (speed * m.scrollSpeed);
        
        // 邊界安全回寫重設（遠山與近山各自在自己的圖層極限回滾）
        if (m.x + m.w < -100) {
          let maxRight = -100;
          mountains.forEach(mt => {
            if(mt.layer === m.layer && mt.x > maxRight) maxRight = mt.x;
          });
          m.x = maxRight + m.w * (m.layer === 'far' ? 0.7 : 0.75);
        }
      });
      
      // 💡 核心修改 2：如果切換回白天，且 clouds 陣列此時為空，代表剛跨越 2000 分。我們在此重新初始化雲朵！
      if (clouds.length === 0) {
        initClouds();
      }

      // 白天更新雲朵移動
      clouds.forEach(c => {
        c.x -= c.speed;
        if (c.x + c.w < -30) {
          c.x = W + 30;
          c.y = 25 + Math.random() * 40;
        }
      });
    }

    // 都市背景滾動更新邏輯
    if (theme === 'city') {
      const bgSpeed = speed * 0.15; 
      cityBuildings.forEach(b => b.x -= bgSpeed);
      cityBuildings.forEach(b => {
        if (b.x + b.w < 0) {
          b.x = W + Math.random() * 40;
          b.w = 60 + Math.random() * 80;
          b.h = 100 + Math.random() * 110;
          b.windows = [];
          const cols = Math.floor(b.w / 18);
          const rows = Math.floor(b.h / 25);
          for(let r=1; r<rows-1; r++){
            for(let c=1; c<cols-1; c++){
              if(Math.random() < 0.35) b.windows.push({dx: c*18, dy: r*25});
            }
          }
        }
      });
    }

    manageSpawning();

    obstacles.forEach(o=>{ o.x -= speed; if(o.kind==='roach') o.wing += 0.4; });
    obstacles = obstacles.filter(o=> o.x + o.w > -10);

    collectibles.forEach(c=>{ c.x -= speed; c.spin += 0.08; });
    collectibles = collectibles.filter(c=> c.x + c.w > -10 && !c.taken);

    // 取得精準判定盒
    const hitbox = getPlayerHitbox();

    // 障礙物碰撞檢測
    for(const o of obstacles){
      const obox = {x:o.x+6, y:o.y+6, w:o.w-12, h:o.h-12};
      if(rectsOverlap(hitbox, obox)){ endGame(); return; }
    }
    
    // 收集物碰撞檢測
    for(const c of collectibles){
      if(c.taken) continue;
      const cbox = {x:c.x+4, y:c.y+4, w:c.w-8, h:c.h-8};
      if(rectsOverlap(hitbox, cbox)){
        c.taken = true;
        score += 10; 
        if(c.kind==='poop') poopCount++; else giftCount++;
      }
    }

    const scale = player.ducking && player.onGround ? 0.72 : 1;
    const tiltDeg = !player.onGround ? -8 : 0;
    spriteEl.style.transform =
      `translate(${player.x - (SPRITE_W-player.w)/2}px, ${player.y - (SPRITE_H-58)}px) ` +
      `scale(${scale}) rotate(${tiltDeg}deg)`;
  }

  // 天空背景漸層渲染
  function drawSky() {
    const theme = getTheme();
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    if (theme === 'snow') {
      // 白天：溫馨的北歐冬日破曉晴空色
      grad.addColorStop(0, '#a1c4fd');
      grad.addColorStop(1, '#c2e9fb');
    } else {
      // 夜晚：深邃的都市霓虹夜空色
      grad.addColorStop(0, '#0d081f'); 
      grad.addColorStop(1, '#1a103c');
    }
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  // --- 【核心修改 4：利用多圓重疊渲染出高低起伏的「複雜蓬鬆積雲」】 ---
  function drawClouds() {
    ctx.save();
    ctx.fillStyle = 'rgba(255, 255, 255, 0.7)'; // 溫和半透明白色
    
    clouds.forEach(c => {
      // 1. 繪製底部圓角長條
      ctx.beginPath();
      ctx.roundRect(c.x, c.y, c.w, c.h, c.h / 2);
      ctx.fill();
      
      // 2. 繪製上方的重疊泡泡圓形，構成複雜起伏形狀
      c.circles.forEach(circ => {
        ctx.beginPath();
        ctx.arc(c.x + circ.rx, c.y + circ.ry + c.h / 2, circ.r, 0, Math.PI * 2);
        ctx.fill();
      });
    });
    
    ctx.restore();
  }

  // 城市剪影大樓繪製
  function drawCityBuildings() {
    ctx.save();
    cityBuildings.forEach(b => {
      ctx.fillStyle = '#111424'; 
      ctx.fillRect(b.x, groundY - b.h, b.w, b.h);
      
      b.windows.forEach(w => {
        ctx.fillStyle = 'rgba(255, 225, 120, 0.75)'; 
        ctx.fillRect(b.x + w.dx, groundY - b.h + w.dy, 6, 8);
      });
    });
    ctx.restore();
  }

  // 雪花繪製
  function drawSnow(){
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    snowflakes.forEach(s=>{
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fill();
    });
  }

  // 地面繪製
  function drawGround(){
    const theme = getTheme();
    
    if (theme === 'snow') {
      // 原版雪地路面
      ctx.fillStyle = '#eef6fb';
      ctx.fillRect(0, groundY+2, W, H-groundY-2);
      ctx.strokeStyle = '#c7d9e6';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, groundY+2); ctx.lineTo(W, groundY+2); ctx.stroke();
      
      // 繪製雪地上的移動小碎塊
      ctx.fillStyle = 'rgba(199,217,230,0.9)';
      const off = (frame*Math.floor(speed)) % 40;
      for(let x=-off; x<W; x+=40){
        ctx.fillRect(x, groundY+10, 16, 3);
      }
    } else {
      // 馬路主題：瀝青黑路與黃色雙虛線
      ctx.fillStyle = '#1e1e24'; 
      ctx.fillRect(0, groundY+2, W, H-groundY-2);
      ctx.strokeStyle = '#3e3e4a';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, groundY+2); ctx.lineTo(W, groundY+2); ctx.stroke();

      ctx.fillStyle = '#f1c40f'; 
      const off = (frame*Math.floor(speed)) % 50;
      for(let x=-off; x<W; x+=50){
        ctx.fillRect(x, groundY+30, 24, 4); 
      }
    }
  }

  function drawObstacles(){
    obstacles.forEach(o=>{
      const img = images[o.kind];
      if(img && img.complete && img.naturalWidth !== 0) {
        ctx.drawImage(img, o.x, o.y, o.w, o.h);
      } else {
        ctx.fillStyle = o.kind === 'roach' ? '#5c4033' : '#f2604a';
        ctx.fillRect(o.x, o.y, o.w, o.h);
      }

      // --- 【Debug 模式：繪製障礙物紅色物理判定盒】 ---
      if (DEBUG_MODE) {
        ctx.strokeStyle = 'red';
        ctx.lineWidth = 2;
        ctx.strokeRect(o.x+6, o.y+6, o.w-12, o.h-12);
      }
    });
  }

  function drawCollectibles(){
    collectibles.forEach(c=>{
      if(c.taken) return;
      const bob = Math.sin(c.spin)*4; 
      const img = images[c.kind];
      if(img && img.complete && img.naturalWidth !== 0) {
        ctx.drawImage(img, c.x, c.y + bob, c.w, c.h);
      } else {
        ctx.fillStyle = c.kind === 'poop' ? '#a0522d' : '#2e8b57';
        ctx.fillRect(c.x, c.y + bob, c.w, c.h);
      }
    });
  }

  function drawScore(){
    const theme = getTheme();
    // 白天與黑夜動態調整字體顏色
    ctx.fillStyle = theme === 'snow' ? '#1c3f66' : '#fffdf7';

    ctx.font = 'bold 14px "Courier New", monospace';
    ctx.textAlign = 'right';
    ctx.fillText('分數 ' + Math.floor(score).toString().padStart(5,'0'), W-16, 26);
    ctx.fillText('最高 ' + best.toString().padStart(5,'0'), W-16, 44);
    ctx.fillText('💩x' + poopCount + '  🎁x' + giftCount, W-16, 62);
    ctx.textAlign = 'left';

    // --- 【Debug 模式：在畫面上繪製狐狸的綠色物理判定盒】 ---
    if (DEBUG_MODE) {
      const hitbox = getPlayerHitbox();
      ctx.strokeStyle = 'lime';
      ctx.lineWidth = 2;
      ctx.strokeRect(hitbox.x, hitbox.y, hitbox.w, hitbox.h);
    }
  }

  function render(){
    ctx.clearRect(0,0,W,H);
    
    // 1. 繪製天空
    drawSky();
    
    // 2. 根據不同主題渲染背景遠景
    const theme = getTheme();
    if (theme === 'snow') {
      drawClouds(); // 白天繪製雲朵
      // 💡 【新增】：白天繪製幾何三角形雪山與雪帽
      // 💡 【重構】：白天繪製「立體摺紙光影風」雙層幾何雪山與雪帽
      // 核心技巧：先畫所有遠山，再畫所有近山，利用一刀切繪製出迎光面與背光面
      const layersOrder = ['far', 'near'];
      layersOrder.forEach(layerTag => {
        mountains.forEach(m => {
          if (m.layer !== layerTag) return;

          const peakX = m.x + m.peakOffset;
          const peakY = groundY - m.h;
          const snowRatio = 0.32; // 雪帽佔山體高度比例

          // --- 1. 繪製山體左半邊（迎光面） ---
          ctx.fillStyle = m.colorL;
          ctx.beginPath();
          ctx.moveTo(m.x, groundY + 2);
          ctx.lineTo(peakX, peakY);
          ctx.lineTo(peakX, groundY + 2); // 垂直中線
          ctx.closePath(); ctx.fill();

          // --- 2. 繪製山體右半邊（背光面） ---
          ctx.fillStyle = m.colorR;
          ctx.beginPath();
          ctx.moveTo(peakX, groundY + 2); // 垂直中線
          ctx.lineTo(peakX, peakY);
          ctx.lineTo(m.x + m.w, groundY + 2);
          ctx.closePath(); ctx.fill();

          // --- 3. 繪製左半邊雪帽 ---
          ctx.fillStyle = m.snowL;
          ctx.beginPath();
          ctx.moveTo(m.x + m.peakOffset * (1 - snowRatio), groundY - m.h * (1 - snowRatio));
          ctx.lineTo(peakX, peakY);
          ctx.lineTo(peakX, groundY - m.h * (1 - snowRatio));
          ctx.closePath(); ctx.fill();

          // --- 4. 繪製右半邊雪帽 ---
          ctx.fillStyle = m.snowR;
          ctx.beginPath();
          ctx.moveTo(peakX, groundY - m.h * (1 - snowRatio));
          ctx.lineTo(peakX, peakY);
          ctx.lineTo(peakX + (m.w - m.peakOffset) * snowRatio, groundY - m.h * (1 - snowRatio));
          ctx.closePath(); ctx.fill();
        });
      });
    } else {
      drawCityBuildings(); // 夜晚繪製都市大樓
      drawSnow();          // 夜晚繪製雪景
    }
    
    // 3. 繪製路面、障礙物、收集物與 UI
    drawGround();
    drawObstacles();
    drawCollectibles();
    drawScore();
  }

  function loop(currentTime){
    requestAnimationFrame(loop);
    const elapsed = currentTime - lastTime;
    if (elapsed >= msPerFrame) {
      lastTime = currentTime - (elapsed % msPerFrame);
      if(state==='running') update();
      render();
    }
  }

  function resizeGame() {
    const wrap = document.getElementById('wrap');
    const targetWidth = window.innerWidth * 0.95;
    const scale = targetWidth / 800; 
    
    wrap.style.transform = `scale(${scale})`;

    const marginX = (800 * scale - 800) / 2;
    const marginY = (300 * scale - 300) / 2;
    
    wrap.style.marginLeft = `${marginX}px`;
    wrap.style.marginRight = `${marginX}px`;
    wrap.style.marginTop = `${marginY}px`;
    wrap.style.marginBottom = `${marginY}px`;
  }

  window.addEventListener('resize', resizeGame);
  resizeGame(); 

  resetGame();
  render();
  
  requestAnimationFrame((time) => {
    lastTime = time;
    loop(time);
  });
})();
</script>
